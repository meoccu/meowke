name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5 # 升级到支持 Node.js 24 的版本

      - name: Setup Node.js
        uses: actions/setup-node@v5 # 升级到支持 Node.js 24 的版本
        with:
          node-version: 22 # 建议升级到长期支持的 22.x 版本

      - name: Setup Java
        uses: actions/setup-java@v5 # 升级到支持 Node.js 24 的版本
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4 # 升级到支持 Node.js 24 的版本

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Install dependencies
        run: |
          cd meowke
          npm ci # 用 npm ci 替代 npm install，依赖版本更稳定

      - name: Prebuild Android project
        run: |
          cd meowke
          npx expo prebuild -p android --no-install

      - name: Build APK
        run: |
          cd meowke/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: meowke-apk
          path: meowke/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
